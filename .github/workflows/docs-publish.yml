name: Docs Publish

# Publishes this SDK's API reference (phpDocumentor) to this repository's own
# GitHub Pages site on a release tag.
#
# Packagist renders only a README — it hosts no API reference — so the reference
# docs are generated here and deployed to GitHub Pages.
#
# Unlike the monorepo this SDK was extracted from (where every SDK deployed into
# its own `sdk/<lang>/` subdirectory of one shared Pages site and therefore had
# to set `keep_files: true` to avoid clobbering its siblings), this repository
# owns its entire Pages site. The docs go to the gh-pages ROOT, and each deploy
# fully replaces the previous one — a removed class should disappear from the
# published reference rather than linger forever as an orphaned page.
#
# Published at: https://ilpanich.github.io/axiam-php-sdk/

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# gh-pages is a single branch: serialize deploys so two tags pushed together
# cannot race each other's commit.
concurrency:
  group: docs-publish
  cancel-in-progress: false

jobs:
  # A release tag must be cut from main — same gate as sdk-ci-php.yml.
  verify-tag-on-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
      - name: Assert the tagged commit is an ancestor of origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on origin/main — refusing to publish docs."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} is on origin/main."

  docs-php:
    name: PHP SDK docs (phpDocumentor)
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # v2.37.2
        with:
          # 8.2, not 8.1 — matches sdk-ci-php.yml (the dev-only Laravel/Symfony
          # bridges require ^8.2).
          php-version: '8.2'
          extensions: sodium, sockets
          coverage: none
      - name: Build API docs
        run: |
          set -euo pipefail
          curl -sSL -o phpDocumentor.phar \
            https://github.com/phpDocumentor/phpDocumentor/releases/latest/download/phpDocumentor.phar
          chmod +x phpDocumentor.phar
          # phpdoc.dist.xml drives the run: it excludes src/Grpc/Gen (protoc
          # output — hundreds of generated accessors that would bury the real
          # API surface) and restricts output to public visibility.
          ./phpDocumentor.phar --target=_docs_out
      - name: Deploy to GitHub Pages (site root)
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_docs_out
          commit_message: "docs: publish API reference for ${{ github.ref_name }}"
